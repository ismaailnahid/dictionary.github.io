<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gboard Dictionary Editor Pro</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #ffffff73;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #ff2600;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.05);
            --toast-bg: #1e293b;
            --toast-color: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b1c;
            --text: #b7c9da;
            --text-muted: #d2ddd0;
            --border: #33415579;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Two Column Layout for Editor Tab */
        #editor-tab.active {
            display: grid !important;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            align-items: start;
        }

        .editor-left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .editor-right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Full width sections */
        .full-width-section {
            grid-column: 1 / -1;
        }

        .header {
            text-align: center;
            padding-bottom: 0;
            margin: auto;
            grid-column: 1 / -1;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-wrap: normal;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            line-height: 1.4;
        }

        /* Progress Bar */
        .progress-container {
            margin: 16px 0;
            grid-column: 1 / -1;
        }

        .progress-bar {
            max-width: 60%;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin: auto;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 8px;
            transition: width 0.5s ease;
        }

        .progress-text {
            display: block;
            text-align: center;
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Form Elements */
        input,
        textarea,
        button,
        select {
            font-family: inherit;
            font-size: 14px;
        }

        textarea,
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            font-size: 14px;
        }

        textarea:focus,
        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.4;
            font-size: 14px;
            color: #0da271;
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            font-size: 0.9rem;
            justify-content: center;
            text-align: center;
            min-height: 24px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-warning {
            background: var(--warning);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-secondary {
            background: var(--text-muted);
        }

        .btn-success:hover {
            background: #0da271;
        }

        .btn-warning:hover {
            background: #e58a08;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* File Upload */
        .file-upload {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 4px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-info {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Actions Grid */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 5px 10px;
            width: fit-content;
        }

        .actions-grid .btn {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 44px;
            font-size: 0.9rem;
            padding: 10px 12px;
        }

        /* Input Groups */
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: end;
        }

        .input-field {
            flex: 1;
            min-width: 150px;
        }

        .input-field label {
            display: block;
            margin-bottom: 6px;
            padding: 2px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        /* Advanced Filters */
        .advanced-filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 10px 5px 5px;
            padding: 16px;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.8rem;
        }

        /* Preview */
        #preview {
            height: 400px;
            overflow: auto;
            background: var(--bg);
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 13px;
        }

        #preview div {
            padding: 8px 10px;
            border-radius: 6px;
            transition: all 0.2s ease;
            margin-bottom: 3px;
            cursor: pointer;
            border-left: 3px solid transparent;
            font-size: 13px;
            line-height: 1.3;
            display: flex;
            justify-content: space-between;
        }

        #preview div:hover {
            background: rgba(37, 99, 235, 0.05);
        }

        #preview .shortcut {
            font-weight: 700;
            color: var(--primary);
            min-width: 120px;
            font-size: 13px;
        }

        #preview .value {
            color: #0da271;
            font-size: 13px;
            word-break: break-word;
            flex: 1;
            text-align: left;
            padding-left: 10px;
        }

        #preview .highlight {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: var(--warning);
        }

        #preview .selected {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(139, 92, 246, 0.1));
            border-left-color: var(--primary);
            transform: translateX(4px);
        }

        #preview .new-entry {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: var(--success);
        }

        #preview .edited-entry {
            background: rgba(255, 0, 0, 0.1);
            border-left-color: var(--danger);
        }

        /* Stats */
        #stats {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 10px;
            padding: 10px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            line-height: 1.4;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-color);
            padding: 14px 20px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            max-width: 90%;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        /* Alphabet Bar */
        #alphabetBar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 14px 0;
            padding: 14px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        #alphabetBar span {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            padding: 5px 8px;
            border-radius: 6px;
            min-width: 30px;
            text-align: center;
        }

        #alphabetBar span:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        /* Edit Controls */
        .edit-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            z-index: 998;
        }

        .settings-btn:hover {
            transform: rotate(30deg);
            border-color: var(--primary);
        }

        /* Settings Modal */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .settings-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .settings-content {
            background: var(--card);
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .settings-header h3 {
            color: var(--primary);
            font-size: 1.3rem;
        }

        .close-settings {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .close-settings:hover {
            color: var(--danger);
            transform: scale(1.1);
        }

        .settings-section {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .settings-section h4 {
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1rem;
        }

        /* FAB */
        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .fab {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .fab-actions {
            position: absolute;
            bottom: 65px;
            right: 0;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .fab-actions.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        .fab-action {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab-action:hover {
            transform: scale(1.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (min-width: 1200px) {
            #editor-tab.active {
                grid-template-columns: 1fr 1fr;
            }

            .container {
                padding: 30px;
                gap: 24px;
            }

            .card {
                padding: 24px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .actions-grid {
                grid-template-columns: repeat(5, 1fr);
            }

            .actions-grid .btn {
                font-size: 0.90rem;
                padding: 6px 8px;
                min-height: 36px;
            }

            .settings-content {
                max-width: 550px;
            }
        }

        @media (max-width: 1199px) and (min-width: 768px) {
            body {
                padding: 20px 16px;
            }

            .container {
                padding: 24px;
            }

            #editor-tab.active {
                grid-template-columns: 1fr 1fr;
            }

            .actions-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 767px) and (min-width: 576px) {
            body {
                padding: 16px 12px;
            }

            .container {
                padding: 20px 16px;
                gap: 16px;
            }

            #editor-tab.active {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 18px;
            }

            h1 {
                font-size: 2rem;
            }

            .actions-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .settings-btn {
                top: 15px;
                right: 15px;
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 12px 8px;
                font-size: 13px;
            }

            .container {
                padding: 16px 12px;
                gap: 14px;
            }

            #editor-tab.active {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 4px;
            }

            h1 {
                font-size: 1.2rem;
            }

            .subtitle {
                font-size: 0.75rem;
            }

            .actions-grid {
                display: flex;
                gap: 4px;
                flex-wrap: wrap;
            }

            .actions-grid .btn {
                font-size: 0.7rem;
                padding: 4px 4px;
                min-height: 30px;
            }

            .settings-btn {
                top: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }

            .settings-content {
                width: 95%;
                padding: 15px;
            }
        }

        /* Touch device improvements */
        @media (hover: none) and (pointer: coarse) {

            .btn:hover,
            .fab:hover,
            .fab-action:hover,
            #alphabetBar span:hover,
            .settings-btn:hover {
                transform: none;
            }

            .btn:active {
                transform: scale(0.98);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 Gboard Dictionary Pro</h1>
            <p class="subtitle">Advanced Dictionary Editor</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <span class="progress-text" id="progressText">Loading... </span>
        </div>

        <!-- Editor Tab -->
        <div id="editor-tab" class="tab-content active">
            <!-- File Upload -->
            <div class="card full-width-section">
                <h3>📁 File Management</h3>
                <div class="file-upload">
                    <input type="file" id="fileInput" accept=".txt,.zip">
                    <button class="btn" id="fileBtn">📂 Choose File</button>
                    <span class="file-info" id="fileName">No file selected</span>
                </div>
            </div>

            <!-- Text Area -->
            <div class="card full-width-section">
                <h3>📝 Dictionary Content</h3>
                <textarea id="textArea"
                    placeholder="Your dictionary content will appear here...&#10;Format: shortcut&#9;value&#9;en-US&#9;"
                    spellcheck="false"></textarea>
            </div>

            <!-- LEFT COLUMN -->
            <div class="editor-left-column">
                <!-- Quick Actions -->
                <div class="card">
                    <h3>⚡ Quick Actions</h3>
                    <div class="actions-grid">
                        <button class="btn" onclick="sortLines()">🔀 Sort</button>
                        <button class="btn" onclick="removeEmptyLines()">🗑️ Spaces</button>
                        <button class="btn" onclick="removeDuplicates()">📑 Duplicates</button>
                        <button class="btn" onclick="removeExtraSpaces()">✨ Format</button>
                        <button class="btn btn-success" onclick="downloadFile()">📥 TXT</button>
                        <button class="btn btn-success" onclick="downloadZip()">📦 ZIP</button>
                        <button class="btn btn-warning" onclick="sendToTelegram()">📤 Telegram</button>
                        <button class="btn" onclick="goToLastChange()">🟢 Changed</button>
                    </div>
                </div>

                <!-- Add Entry -->
                <div class="card">
                    <h3 style="color: greenyellow;">➕ New Entry</h3>
                    <div class="input-group">
                        <div class="input-field">
                            <label>Shortcut</label>
                            <input type="text" id="shortcutInput" placeholder="Enter shortcut... ">
                        </div>
                        <div class="input-field">
                            <label>Value</label>
                            <input type="text" id="valueInput" placeholder="Enter full value... ">
                        </div>
                        <button class="btn" onclick="addEntry()">Add Entry</button>
                    </div>
                </div>

                <!-- Advanced Filters -->
                <div class="card">
                    <h3>🔍 Advanced Filters</h3>
                    <div class="advanced-filters">
                        <div class="filter-group">
                            <label>🔤 Shortcut Filter</label>
                            <input type="text" id="shortcutFilter" placeholder="Filter shortcuts...">
                        </div>
                        <div class="filter-group">
                            <label>📝 Value Filter</label>
                            <input type="text" id="valueFilter" placeholder="Filter values...">
                        </div>
                        <div class="filter-group">
                            <label>🎯 Filter Type</label>
                            <select id="filterType">
                                <option value="contains">Contains</option>
                                <option value="startsWith">Starts With</option>
                                <option value="endsWith">Ends With</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>📊 Sort By</label>
                            <select id="sortBy">
                                <option value="shortcut">Shortcut A-Z</option>
                                <option value="shortcut-desc">Shortcut Z-A</option>
                                <option value="value">Value A-Z</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn" onclick="clearFilters()" style="margin-top: 6px; width: 100%;">❌ Clear
                        Filters</button>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="editor-right-column">
                <!-- Preview Section -->
                <div class="card">
                    <h3>👁️ Live Preview</h3>
                    <div class="input-group">
                        <div class="input-field">
                            <label>✏️ Edit Shortcut</label>
                            <input type="text" id="editShortcut" placeholder="Edit shortcut...">
                        </div>
                        <div class="input-field">
                            <label>📝 Edit Value</label>
                            <input type="text" id="editValue" placeholder="Edit value...">
                        </div>
                    </div>

                    <div class="edit-controls">
                        <button class="btn btn-success" id="applyEditBtn">✅ Apply</button>
                        <button class="btn btn-danger" id="deleteBtn">🗑️ Delete</button>
                    </div>

                    <div id="alphabetBar"></div>
                    <div id="preview"></div>
                    <div id="stats"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Button -->
    <button class="settings-btn" onclick="openSettings()">⚙️</button>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <h3>⚙️ Settings</h3>
                <button class="close-settings" onclick="closeSettings()">&times;</button>
            </div>

            <div class="settings-section">
                <h4>🎨 Theme Settings</h4>
                <div class="filter-group">
                    <label>🌓 Theme</label>
                    <select id="themeSelect" onchange="changeTheme(this.value)">
                        <option value="auto">Auto</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>⚙️ Editor Settings</h4>
                <div class="filter-group">
                    <label>💾 Auto-save</label>
                    <select id="autoSave">
                        <option value="true">Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>
                <div class="filter-group" style="margin-top: 10px;">
                    <label>⏱️ Backup Interval</label>
                    <select id="backupInterval">
                        <option value="5">5 minutes</option>
                        <option value="10">10 minutes</option>
                        <option value="30">30 minutes</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>🔑 Telegram Settings</h4>
                <div class="filter-group">
                    <label>🤖 Bot Token</label>
                    <input type="password" id="botToken" placeholder="Enter your bot token">
                </div>
                <div class="filter-group" style="margin-top: 10px;">
                    <label>💬 Chat ID</label>
                    <input type="text" id="chatId" placeholder="Enter your chat ID">
                </div>
                <button class="btn" onclick="saveTelegramSettings()" style="margin-top: 12px; width: 100%;">💾 Save
                    Settings</button>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <div class="fab-container">
        <button class="fab" onclick="toggleQuickActions()">⚡</button>
        <div class="fab-actions" id="fabActions">
            <button class="fab-action" onclick="quickAdd()">➕</button>
            <button class="fab-action" onclick="quickSearch()">🔍</button>
            <button class="fab-action" onclick="quickExport()">📤</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ==================== GLOBAL VARIABLES ====================
        const fileInput = document.getElementById('fileInput');
        const textArea = document.getElementById('textArea');
        const preview = document.getElementById('preview');
        const shortcutInput = document.getElementById('shortcutInput');
        const valueInput = document.getElementById('valueInput');
        const shortcutFilter = document.getElementById('shortcutFilter');
        const valueFilter = document.getElementById('valueFilter');
        const editShortcut = document.getElementById('editShortcut');
        const editValue = document.getElementById('editValue');
        const applyEditBtn = document.getElementById('applyEditBtn');
        const stats = document.getElementById('stats');
        const fileBtn = document.getElementById('fileBtn');
        const fileName = document.getElementById('fileName');
        const deleteBtn = document.getElementById('deleteBtn');
        const toast = document.getElementById('toast');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        let filteredLines = [];
        let selectedIndex = -1;
        let scrollToSelected = true;
        let lastChangedIndex = -1;
        let isFabOpen = false;

        // ==================== THEME MANAGEMENT ====================
        function changeTheme(theme) {
            if (theme === 'auto') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.body.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.body.setAttribute('data-theme', theme);
            }
            localStorage.setItem('theme', theme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'auto';
        changeTheme(savedTheme);
        if (document.getElementById('themeSelect')) {
            document.getElementById('themeSelect').value = savedTheme;
        }

        // ==================== SETTINGS MODAL ====================
        function openSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        // Close modal when clicking outside
        document.getElementById('settingsModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeSettings();
            }
        });

        // ==================== FAB ACTIONS ====================
        function toggleQuickActions() {
            const fabActions = document.getElementById('fabActions');
            isFabOpen = !isFabOpen;
            fabActions.classList.toggle('show', isFabOpen);
        }

        function quickAdd() {
            shortcutInput.focus();
            showToast('Quick add mode activated');
        }

        function quickSearch() {
            shortcutFilter.focus();
            showToast('Quick search activated');
        }

        function quickExport() {
            downloadZip();
        }

        // ==================== UTILITY FUNCTIONS ====================
        function showToast(msg, type = 'info') {
            toast.textContent = msg;
            toast.style.background = type === 'error' ? 'var(--danger)' :
                type === 'success' ? 'var(--success)' : 'var(--toast-bg)';
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function updateProgress(percentage, text) {
            progressFill.style.width = percentage + '%';
            progressText.textContent = text;
        }

        // ==================== TEXTAREA CURSOR NAVIGATION ====================
        function updateEditableFromTextarea() {
            const cursorPos = textArea.selectionStart;
            const lines = textArea.value.split('\n');
            let cumulative = 0;
            let lineIndex = 0;

            for (let i = 0; i < lines.length; i++) {
                cumulative += lines[i].length + 1;
                if (cursorPos <= cumulative) {
                    lineIndex = i;
                    break;
                }
            }

            const line = lines[lineIndex];
            const fi = filteredLines.indexOf(line);
            selectedIndex = fi >= 0 ? fi : -1;

            if (selectedIndex >= 0) {
                scrollToSelected = true;
                updatePreview();
                updateEditableFields();
            }
        }

        // ==================== PREVIEW SYSTEM ====================
        function updatePreview() {
            const lines = textArea.value.split('\n').filter(line => line.trim());
            const counts = {};
            lines.forEach(line => {
                const sc = line.split('\t')[0];
                if (sc) counts[sc] = (counts[sc] || 0) + 1;
            });

            const sFilter = shortcutFilter.value.toLowerCase();
            const vFilter = valueFilter.value.toLowerCase();
            const filterType = document.getElementById('filterType').value;
            const sortBy = document.getElementById('sortBy').value;

            filteredLines = lines.filter(line => {
                const parts = line.split('\t');
                const sc = parts[0]?.toLowerCase() || '';
                const val = parts[1]?.toLowerCase() || '';

                let scMatch = false, valMatch = false;

                switch (filterType) {
                    case 'startsWith':
                        scMatch = sc.startsWith(sFilter);
                        valMatch = val.startsWith(vFilter);
                        break;
                    case 'endsWith':
                        scMatch = sc.endsWith(sFilter);
                        valMatch = val.endsWith(vFilter);
                        break;
                    default:
                        scMatch = sc.includes(sFilter);
                        valMatch = val.includes(vFilter);
                }

                return scMatch && valMatch;
            });

            filteredLines.sort((a, b) => {
                const aParts = a.split('\t');
                const bParts = b.split('\t');

                switch (sortBy) {
                    case 'shortcut-desc':
                        return (bParts[0] || '').localeCompare(aParts[0] || '');
                    case 'value':
                        return (aParts[1] || '').localeCompare(bParts[1] || '');
                    default:
                        return (aParts[0] || '').localeCompare(bParts[0] || '');
                }
            });

            const prevClasses = [];
            Array.from(preview.children).forEach(div => {
                prevClasses.push({
                    sc: div.querySelector(".shortcut")?.textContent,
                    cls: div.className
                });
            });

            preview.innerHTML = filteredLines.map((line, i) => {
                const parts = line.split('\t');
                const sc = parts[0] || '', val = parts[1] || '';
                const isDup = counts[sc] > 1, isSelected = i === selectedIndex;

                const prev = prevClasses.find(p => p.sc === sc);
                let cls = isSelected ? 'selected' : '';
                if (isDup) cls += ' highlight';
                if (prev) cls += ' ' + prev.cls.replace('selected', '').replace('highlight', '').trim();

                return `<div class="${cls}" data-index="${i}">
                <span class="shortcut">${escapeHtml(sc)}</span>
                <span class="value">${escapeHtml(val)}</span>
            </div>`;
            }).join('');

            let dup = 0;
            for (let k in counts) if (counts[k] > 1) dup += counts[k] - 1;

            const lineNumberText = selectedIndex >= 0 ? `Line: ${selectedIndex + 1} | ` : '';
            stats.textContent = `${lineNumberText}Total: ${lines.length} | Duplicates: ${dup} | Filtered: ${filteredLines.length}`;

            updateEditableFields();
            updateProgress((filteredLines.length / Math.max(lines.length, 1)) * 100, `${filteredLines.length} entries displayed`);

            if (scrollToSelected && selectedIndex >= 0) {
                const child = preview.children[selectedIndex];
                if (child) {
                    preview.scrollTop = child.offsetTop - preview.offsetTop;
                }
            }
            scrollToSelected = true;
        }

        function updateEditableFields() {
            if (selectedIndex >= 0 && filteredLines[selectedIndex]) {
                const parts = filteredLines[selectedIndex].split('\t');
                editShortcut.value = parts[0] || '';
                editValue.value = parts[1] || '';
            } else {
                editShortcut.value = '';
                editValue.value = '';
            }
        }

        // ==================== FILE HANDLING ====================
        fileBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;

            fileName.textContent = file.name;
            updateProgress(0, 'Loading file...');

            const reader = new FileReader();

            if (file.name.endsWith('.txt')) {
                reader.onload = e => {
                    textArea.value = e.target.result;
                    updatePreview();
                    updateProgress(100, 'File loaded successfully');
                    showToast('Text file loaded successfully', 'success');
                };
                reader.readAsText(file);
            } else if (file.name.endsWith('.zip')) {
                reader.onload = e => {
                    JSZip.loadAsync(e.target.result).then(zip => {
                        const dictFile = zip.file("dictionary.txt");
                        if (dictFile) {
                            dictFile.async("string").then(content => {
                                textArea.value = content;
                                updatePreview();
                                updateProgress(100, 'ZIP file extracted successfully');
                                showToast('ZIP file extracted successfully', 'success');
                            });
                        } else {
                            showToast("No dictionary.txt found in ZIP file", 'error');
                        }
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // ==================== LINE OPERATIONS ====================
        function removeEmptyLines() {
            textArea.value = textArea.value.split('\n').filter(l => l.trim() !== '').join('\n');
            updatePreview();
            showToast("Empty lines removed!", 'success');
        }

        function removeDuplicates() {
            const seen = new Set();
            const lines = textArea.value.split('\n');
            const result = [];

            lines.forEach(line => {
                const sc = line.split('\t')[0];
                if (!seen.has(sc)) {
                    seen.add(sc);
                    result.push(line);
                }
            });

            textArea.value = result.join('\n');
            updatePreview();
            showToast("Duplicates removed!", 'success');
        }

        function removeExtraSpaces() {
            const lines = textArea.value.split('\n');
            const cleaned = lines.map(line => line.split('\t').map(p => p.trim()).join('\t'));
            textArea.value = cleaned.join('\n');
            updatePreview();
            showToast("Extra spaces cleaned!", 'success');
        }

        function sortLines() {
            const lines = textArea.value.split('\n');
            const comments = lines.filter(l => l.trim().startsWith('#'));
            const normal = lines.filter(l => !l.trim().startsWith('#'));
            normal.sort((a, b) => (a.split('\t')[0] || '').localeCompare(b.split('\t')[0] || ''));
            textArea.value = [...comments, ...normal].join('\n');
            updatePreview();
            showToast("Lines sorted alphabetically!", 'success');
        }

        // ==================== ENTRY MANAGEMENT ====================
        function addEntry() {
            const sc = shortcutInput.value.trim();
            const val = valueInput.value.trim();
            if (!sc || !val) return showToast('Please enter both shortcut and value!', 'error');

            const newEntry = `${sc}\t${val}\ten-US\t`;
            textArea.value += (textArea.value ? '\n' : '') + newEntry;
            shortcutInput.value = valueInput.value = '';
            updatePreview();
            shortcutInput.focus();
            showToast("New entry added!", 'success');

            selectedIndex = filteredLines.length - 1;
            lastChangedIndex = selectedIndex;
            const newDiv = preview.children[selectedIndex];
            if (newDiv) newDiv.classList.add('new-entry');
        }

        applyEditBtn.addEventListener('click', () => {
            if (selectedIndex < 0) return showToast("No entry selected!", 'error');
            const lines = textArea.value.split('\n');
            const targetLine = filteredLines[selectedIndex];
            const indexInAll = lines.indexOf(targetLine);
            if (indexInAll < 0) return;

            lines[indexInAll] = `${editShortcut.value}\t${editValue.value}\ten-US\t`;
            textArea.value = lines.join('\n');
            updatePreview();
            showToast("Entry updated!", 'success');

            const editedDiv = preview.children[selectedIndex];
            if (editedDiv) {
                editedDiv.classList.remove('new-entry');
                editedDiv.classList.add('edited-entry');
                lastChangedIndex = selectedIndex;
            }
        });

        function deleteEntry() {
            if (selectedIndex < 0) return showToast("No entry selected!", 'error');
            const lines = textArea.value.split('\n');
            const targetLine = filteredLines[selectedIndex];
            const indexInAll = lines.indexOf(targetLine);
            if (indexInAll >= 0) {
                lines.splice(indexInAll, 1);
                textArea.value = lines.join('\n');
                selectedIndex = -1;
                updatePreview();
                showToast("Entry deleted!", 'success');
            }
        }

        deleteBtn.addEventListener('click', deleteEntry);

        function goToLastChange() {
            if (lastChangedIndex >= 0 && lastChangedIndex < filteredLines.length) {
                selectedIndex = lastChangedIndex;
                scrollToSelected = true;
                updatePreview();
                updateEditableFields();
                showToast("Jumped to last changed entry!", 'success');
            } else {
                showToast("No changes to jump to!", 'error');
            }
        }

        // ==================== TELEGRAM SETTINGS ====================
        function saveTelegramSettings() {
            const botToken = document.getElementById('botToken').value;
            const chatId = document.getElementById('chatId').value;

            if (botToken && chatId) {
                localStorage.setItem('telegramBotToken', botToken);
                localStorage.setItem('telegramChatId', chatId);
                showToast("Telegram settings saved!", 'success');
                closeSettings();
            } else {
                showToast("Please enter both Bot Token and Chat ID!", 'error');
            }
        }

        async function sendToTelegram() {
            const BOT_TOKEN = localStorage.getItem('telegramBotToken') || "YOUR_BOT_TOKEN";
            const CHAT_ID = localStorage.getItem('telegramChatId') || "YOUR_CHAT_ID";

            if (BOT_TOKEN === "YOUR_BOT_TOKEN") {
                showToast("Please configure Telegram settings first!", 'error');
                openSettings();
                return;
            }

            const textContent = textArea.value || "File is empty!";
            const blob = new Blob([textContent], { type: 'text/plain' });
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("document", blob, "dictionary.txt");

            try {
                showToast("Sending to Telegram...", 'info');
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: "POST",
                    body: formData
                });
                if (res.ok) {
                    showToast("✅ File sent to Telegram!", 'success');
                } else {
                    showToast("⚠️ Failed to send file!", 'error');
                }
            } catch (err) {
                console.error(err);
                showToast("❌ Error sending file!", 'error');
            }
        }

        // ==================== ALPHABET BAR ====================
        function initAlphabetBar() {
            const alphabetBar = document.getElementById("alphabetBar");
            alphabetBar.innerHTML = '';

            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
                const span = document.createElement("span");
                span.textContent = letter;
                span.addEventListener("click", () => jumpToLetter(letter.toLowerCase()));
                alphabetBar.appendChild(span);
            });
        }

        function jumpToLetter(letter) {
            for (let i = 0; i < preview.children.length; i++) {
                const sc = preview.children[i].querySelector(".shortcut")?.textContent.toLowerCase();
                if (sc && sc.startsWith(letter)) {
                    selectedIndex = i;
                    scrollToSelected = true;
                    updatePreview();
                    updateEditableFields();
                    showToast(`Jumped to entries starting with "${letter}"`);
                    break;
                }
            }
        }

        // ==================== EVENT LISTENERS ====================
        textArea.addEventListener('click', updateEditableFromTextarea);
        textArea.addEventListener('keyup', updateEditableFromTextarea);
        textArea.addEventListener('input', updateEditableFromTextarea);

        textArea.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                setTimeout(() => {
                    updateEditableFromTextarea();
                }, 10);
            }
        });

        shortcutFilter.addEventListener('input', () => {
            selectedIndex = -1;
            updatePreview();
        });

        valueFilter.addEventListener('input', () => {
            selectedIndex = -1;
            updatePreview();
        });

        document.getElementById('filterType').addEventListener('change', updatePreview);
        document.getElementById('sortBy').addEventListener('change', updatePreview);

        preview.addEventListener('click', e => {
            const div = e.target.closest('div');
            if (div) {
                const index = parseInt(div.getAttribute('data-index'));
                if (!isNaN(index)) {
                    selectedIndex = index;
                    updatePreview();
                    updateEditableFields();
                }
            }
        });

        function clearFilters() {
            shortcutFilter.value = valueFilter.value = '';
            selectedIndex = 0;
            scrollToSelected = true;
            updatePreview();
            showToast("Filters cleared!", 'success');
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        window.addEventListener('keydown', e => {
            const active = document.activeElement;
            const isEditing = active === textArea || active === shortcutInput || active === valueInput ||
                active === editShortcut || active === editValue;

            if (e.ctrlKey || e.metaKey) {
                switch (e.key.toLowerCase()) {
                    case 's': e.preventDefault(); downloadFile(); break;
                    case 'd': e.preventDefault(); removeDuplicates(); break;
                    case 'e': e.preventDefault(); removeEmptyLines(); break;
                    case 'k': e.preventDefault(); removeExtraSpaces(); break;
                    case 'l': e.preventDefault(); sortLines(); break;
                    case 'o': e.preventDefault(); fileInput.click(); break;
                }
            }

            if (active === textArea) {
                switch (e.key) {
                    case 'ArrowDown':
                    case 'ArrowUp':
                        break;
                    case 'Enter':
                        setTimeout(updateEditableFromTextarea, 10);
                        break;
                }
            }

            if (!isEditing && filteredLines.length > 0 && active !== textArea) {
                switch (e.key) {
                    case 'ArrowDown':
                        e.preventDefault();
                        selectedIndex = Math.min(selectedIndex + 1, filteredLines.length - 1);
                        scrollToSelected = true;
                        updatePreview();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        selectedIndex = Math.max(selectedIndex - 1, 0);
                        scrollToSelected = true;
                        updatePreview();
                        break;
                    case 'Delete':
                        e.preventDefault();
                        deleteEntry();
                        break;
                }
            }

            if (e.key === 'Enter') {
                if (active === shortcutInput || active === valueInput) {
                    e.preventDefault();
                    addEntry();
                } else if (active === editShortcut || active === editValue) {
                    e.preventDefault();
                    applyEditBtn.click();
                }
            }
        });

        shortcutInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addEntry();
            }
        });
        valueInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addEntry();
            }
        });
        editShortcut.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyEditBtn.click();
            }
        });
        editValue.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                applyEditBtn.click();
            }
        });

        // ==================== DOWNLOAD FUNCTIONS ====================
        function downloadFile() {
            const blob = new Blob([textArea.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'dictionary.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast("TXT file downloaded!", 'success');
        }

        function downloadZip() {
            const zip = new JSZip();
            zip.file("dictionary.txt", textArea.value);
            zip.generateAsync({ type: "blob" }).then(content => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = "gboard_dictionary.zip";
                a.click();
                showToast("ZIP file downloaded!", 'success');
            });
        }

        // ==================== INITIALIZATION ====================
        function init() {
            updatePreview();
            initAlphabetBar();

            // Load Telegram settings if exists
            const savedToken = localStorage.getItem('telegramBotToken');
            const savedChatId = localStorage.getItem('telegramChatId');
            if (savedToken) document.getElementById('botToken').value = savedToken;
            if (savedChatId) document.getElementById('chatId').value = savedChatId;

            showToast("Gboard Dictionary Pro Ready! 🚀", 'success');
        }

        init();
    </script>
</body>

</html>
